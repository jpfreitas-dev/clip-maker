<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipMaker | AI Viral Moments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body {
            background:
                radial-gradient(circle at 12% 8%, rgba(6, 182, 212, 0.16), transparent 40%),
                radial-gradient(circle at 88% 72%, rgba(14, 165, 233, 0.14), transparent 46%),
                linear-gradient(180deg, #020617 0%, #0b1120 100%);
            -webkit-font-smoothing: antialiased;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.2);
            backdrop-filter: blur(14px);
        }

        .shimmer {
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(148, 163, 184, 0.32) 45%,
                    rgba(255, 255, 255, 0) 100%);
            background-size: 220% 100%;
            animation: shimmer 2.6s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -220% 0;
            }

            100% {
                background-position: 220% 0;
            }
        }

    </style>
</head>

<body class="font-sans text-slate-100 overflow-x-hidden selection:bg-cyan-400/30">
    <main class="min-h-screen px-4 py-10 sm:py-16">
        <div class="max-w-4xl mx-auto flex flex-col items-center gap-10 sm:gap-12">
            <header class="nav-el opacity-0 w-full flex justify-center">
                <div class="title-el opacity-0 glass-panel rounded-2xl px-6 py-4 flex items-center justify-center gap-3 shadow-sm">
                    <span class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-600 to-cyan-500 text-white flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                    </span>
                    <p class="text-lg font-bold tracking-tight text-slate-100 text-center">ClipMaker</p>
                </div>
            </header>

            <section class="cta-el opacity-0 w-full max-w-2xl glass-panel rounded-3xl p-6 sm:p-8 shadow-sm">
                <div class="grid gap-4">
                        <label for="api-key" class="text-sm font-semibold text-slate-200 tracking-tight">Gemini API Key</label>
                        <div
                            class="group relative rounded-2xl border border-slate-600/70 bg-slate-900/60 focus-within:border-cyan-400 transition duration-300">
                            <div class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-cyan-300">
                                <i data-lucide="key-round" class="w-5 h-5"></i>
                            </div>
                            <input id="api-key" type="password" autocomplete="off" placeholder="Cole sua Gemini API Key"
                                class="w-full rounded-2xl bg-transparent py-4 pl-12 pr-4 text-slate-100 placeholder:text-slate-400 focus:outline-none" />
                        </div>

                        <button id="upload-widget" type="button"
                            class="group inline-flex items-center justify-center gap-3 rounded-2xl bg-gradient-to-r from-sky-600 to-cyan-600 text-white font-bold tracking-tight px-6 py-4 shadow-sm transition duration-300 hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-cyan-500/40">
                            <i data-lucide="upload" class="w-5 h-5 transition duration-300 group-hover:-translate-y-0.5"></i>
                            <span>Começar Upload</span>
                        </button>

                        <div id="loading"
                            class="hidden items-center gap-3 rounded-2xl border border-cyan-500/30 bg-cyan-500/10 px-4 py-3 text-sm font-semibold text-cyan-200">
                            <span class="relative flex h-2.5 w-2.5">
                                <span
                                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-500 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-cyan-600"></span>
                            </span>
                            <span id="loading-text">Encontrando o momento viral...</span>
                        </div>
                    </div>
            </section>

            <section class="video-el opacity-0 w-full">
                <div class="max-w-4xl mx-auto rounded-3xl p-2 sm:p-3 glass-panel shadow-sm transition duration-300 hover:scale-[1.02]">
                    <div class="aspect-video overflow-hidden rounded-2xl bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 relative">
                        <div id="placeholder"
                            class="absolute inset-0 z-20 flex flex-col items-center justify-center text-center px-4 transition-all duration-700">
                            <div class="absolute inset-0 shimmer opacity-45"></div>
                            <span
                                class="relative w-16 h-16 rounded-2xl bg-slate-800/80 border border-slate-600 shadow-sm flex items-center justify-center text-cyan-300">
                                <i data-lucide="play-circle" class="w-9 h-9"></i>
                            </span>
                            <p class="relative mt-4 text-xs sm:text-sm font-bold uppercase tracking-[0.18em] text-slate-300">Ready for Canvas</p>
                        </div>
                        <video id="video" src="" controls
                            class="hidden relative z-30 w-full h-full object-cover bg-slate-950"></video>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="error"
        class="hidden fixed bottom-4 sm:bottom-8 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-2rem)] max-w-lg rounded-2xl border border-rose-500/40 bg-slate-900/90 px-4 py-3 text-rose-300 shadow-sm backdrop-blur-md">
        <div class="flex items-center gap-3">
            <i data-lucide="alert-circle" class="w-5 h-5"></i>
            <span id="error-message" class="font-semibold tracking-tight">Erro ao processar video</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
